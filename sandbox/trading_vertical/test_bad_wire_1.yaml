# BAD: Wire trigger event output directly into a compute bool input
kind: cluster
id: bad_wire_1
version: "0.1.0"

nodes:
  src:
    impl: number_source@0.1.0
    params:
      value: 5.0

  zero:
    impl: number_source@0.1.0
    params:
      value: 0.0

  compare:
    impl: gt@0.1.0

  trigger:
    impl: emit_if_true@0.1.0

  # Try to feed trigger's event back into a compute
  bad_not:
    impl: not@0.1.0

  act:
    impl: ack_action@0.1.0
    params:
      accept: true

edges:
  - src.value -> compare.a
  - zero.value -> compare.b
  - compare.result -> trigger.input
  # THIS IS THE BAD WIRE: Event -> Bool input
  - trigger.event -> bad_not.value
  - trigger.event -> act.event

outputs:
  outcome: act.outcome
