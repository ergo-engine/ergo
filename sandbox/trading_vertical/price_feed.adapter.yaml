kind: adapter
id: csv_price_feed
version: "1.0.0"
runtime_compatibility: "0.1.0"

context_keys:
  - name: timestamp
    type: String
    required: true
    writable: false
    description: Bar timestamp (UTC)
  - name: close
    type: Number
    required: true
    writable: false
    description: Closing price
  - name: x
    type: Number
    required: true
    writable: false
    description: Alias used by context_number_source
  - name: open
    type: Number
    required: false
    writable: false
  - name: high
    type: Number
    required: false
    writable: false
  - name: low
    type: Number
    required: false
    writable: false
  - name: volume
    type: Number
    required: false
    writable: false
  - name: symbol
    type: String
    required: false
    writable: false

event_kinds:
  - name: price_bar
    payload_schema:
      type: object
      additionalProperties: false
      required:
        - timestamp
        - close
        - x
      properties:
        timestamp:
          type: string
        close:
          type: number
        x:
          type: number
        open:
          type: number
        high:
          type: number
        low:
          type: number
        volume:
          type: number
        symbol:
          type: string

capture:
  format_version: "1"
  fields:
    - event.price_bar
    - meta.adapter_id
    - meta.adapter_version
    - meta.timestamp
