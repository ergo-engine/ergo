name: Runtime Surface Verification

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: runtime-surface-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-runtime-surface:
    name: Verify (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Verify runtime surface
        shell: bash
        run: bash verify_runtime_surface.sh
