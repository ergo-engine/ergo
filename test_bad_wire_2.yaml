# BAD: Wire action output into a trigger input
kind: cluster
id: bad_wire_2
version: "0.1.0"

nodes:
  src:
    impl: number_source@0.1.0
    params:
      value: 5.0

  zero:
    impl: number_source@0.1.0
    params:
      value: 0.0

  compare:
    impl: gt@0.1.0

  trigger:
    impl: emit_if_true@0.1.0

  act:
    impl: ack_action@0.1.0
    params:
      accept: true

  # Try to use action's outcome to feed another trigger
  trigger2:
    impl: emit_if_true@0.1.0

edges:
  - src.value -> compare.a
  - zero.value -> compare.b
  - compare.result -> trigger.input
  - trigger.event -> act.event
  # THIS IS THE BAD WIRE: Action output -> Trigger input
  - act.outcome -> trigger2.input

outputs:
  outcome: act.outcome
